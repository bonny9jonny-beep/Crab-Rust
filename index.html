<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Quest: Crab Walk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <div class="max-w-3xl w-full">
        <div class="flex justify-between items-center mb-16 border-b border-white/10 pb-4">
            <h1 class="text-xl font-bold tracking-widest text-orange-500 uppercase">Rust · System · Journey</h1>
            <div id="step-counter" class="text-sm opacity-50">STEP: 01/50</div>
        </div>

        <div class="flex flex-col md:flex-row gap-8 items-center mb-12 relative">
            <div id="ferris" class="crab-avatar floating" onclick="randomQuote()">🦀</div>
            
            <div class="speech-bubble p-6 rounded-r-2xl rounded-bl-2xl flex-1">
                <p id="crab-speech" class="text-lg italic leading-relaxed">
                    Загрузка систем... О, привет! Я Феррис. Я помогу тебе приручить этот чертов Rust. Погнали?
                </p>
            </div>
        </div>

        <div id="content-card" class="bg-zinc-900/30 p-8 rounded-3xl border border-white/5 backdrop-blur-sm min-h-[300px]">
            <h2 id="task-title" class="text-3xl font-black mb-6 text-white tracking-tighter uppercase italic">
                Инициализация
            </h2>
            <div id="task-body" class="space-y-4 text-zinc-400 leading-7">
                </div>

            <div class="mt-12 flex gap-4">
                <button onclick="prevTask()" id="prev-btn" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-xl font-bold transition-all opacity-0 pointer-events-none">
                    НАЗАД
                </button>
                <button onclick="nextTask()" class="flex-[2] py-4 bg-orange-600 hover:bg-orange-500 text-white rounded-xl font-bold shadow-lg shadow-orange-900/20 transition-all active:scale-95">
                    Я СДЕЛАЛ, ДАЛЬШЕ!
                </button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
